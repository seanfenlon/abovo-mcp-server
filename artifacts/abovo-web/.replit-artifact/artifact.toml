kind = "web"
previewPath = "/"
title = "ABOVO MCP Server"
version = "1.0.0"
id = "artifacts/abovo-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23923
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/abovo-web run dev"

[services.env]
PORT = "23923"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/abovo-web", "run", "build"]
publicDir = "artifacts/abovo-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
